<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SH Timesheet</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F5FC;color:#0F172A;min-height:100vh}
.topbar{background:#1F4E78;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100}
.brand{font-size:1.1rem;font-weight:600;color:#fff}
.topbar-r{display:flex;gap:8px;align-items:center}
.sync{display:flex;align-items:center;gap:6px;font-size:.75rem;color:rgba(255,255,255,.85);padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25)}
.dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite}
.dot.off{background:#F87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;border:none}
.btn-white{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-blue{background:#2563EB;color:#fff}
.btn-green{background:#16A34A;color:#fff}
.btn-red{background:#DC2626;color:#fff}
.btn-gray{background:#E2E8F0;color:#0F172A}
.btn-sm{padding:5px 10px;font-size:.76rem}
.main{max-width:1400px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 2px 12px rgba(30,58,138,.08);border-left:4px solid #ccc}
.s1{border-color:#2563EB}.s2{border-color:#D97706}.s3{border-color:#7C3AED}.s4{border-color:#16A34A}
.stat-lbl{font-size:.68rem;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:1.9rem;font-weight:700;color:#0F172A;line-height:1.1;margin-top:2px}
.stat-sub{font-size:.7rem;color:#64748B;margin-top:2px}
.panel{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(30,58,138,.08);overflow:hidden}
.phdr{background:linear-gradient(135deg,#1F4E78,#2563EB);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.phdr h3{font-size:1rem;font-weight:600;color:#fff}
.form-area{padding:20px;border-bottom:1px solid #E2E8F0;background:#EFF6FF;display:none}
.fg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.wide{grid-column:span 2}
.fg label{font-size:.68rem;font-weight:700;color:#64748B;text-transform:uppercase}
.r{color:#DC2626}
.fg input,.fg select,.fg textarea{border:1.5px solid #CBD5E1;border-radius:6px;padding:8px 10px;font-size:.85rem;color:#0F172A;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#2563EB}
.fg textarea{resize:vertical;min-height:56px}
.form-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.fbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid #F1F5F9;flex-wrap:wrap}
.fbar input,.fbar select{border:1.5px solid #CBD5E1;border-radius:6px;padding:6px 10px;font-size:.82rem;background:#fff;color:#0F172A}
.fbar input{flex:1;min-width:150px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{padding:9px 12px;text-align:left;font-size:.67rem;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #E2E8F0;white-space:nowrap;background:#F8FAFC}
td{padding:9px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:hover td{background:#EFF6FF}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.bp{background:#FEF3C7;color:#92400E}
.bi{background:#EDE9FE;color:#5B21B6}
.bc{background:#DCFCE7;color:#166534}
.act{display:flex;gap:4px}
.empty{padding:48px 24px;text-align:center;color:#94A3B8;font-size:.88rem}
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:999}
.toast{padding:10px 16px;border-radius:8px;font-size:.82rem;color:#fff;background:#0F172A;pointer-events:none}
.toast.ok{background:#166534}
.toast.err{background:#991B1B}
@media(max-width:640px){.stats{grid-template-columns:1fr 1fr}.fg.wide{grid-column:span 1}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">&#128197; SH Timesheet</div>
  <div class="topbar-r">
    <div class="sync"><div class="dot off" id="dot"></div><span id="syncTxt">Connecting...</span></div>
    <button class="btn btn-white btn-sm" onclick="exportExcel()">&#11015; Export</button>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat s1"><div class="stat-lbl">Total Hours</div><div class="stat-val" id="sHours">0.0</div><div class="stat-sub">this month</div></div>
    <div class="stat s2"><div class="stat-lbl">Pending</div><div class="stat-val" id="sPending">0</div><div class="stat-sub">tasks</div></div>
    <div class="stat s3"><div class="stat-lbl">In Progress</div><div class="stat-val" id="sProgress">0</div><div class="stat-sub">tasks</div></div>
    <div class="stat s4"><div class="stat-lbl">Completed</div><div class="stat-val" id="sDone">0</div><div class="stat-sub">tasks</div></div>
  </div>
  <div class="panel">
    <div class="phdr">
      <h3>&#128203; Monthly Time Sheet</h3>
      <button class="btn btn-green btn-sm" onclick="showForm()">+ Add Entry</button>
    </div>
    <div class="form-area" id="formArea">
      <div class="fg-grid">
        <div class="fg"><label>Date <span class="r">*</span></label><input type="date" id="fDate"/></div>
        <div class="fg"><label>Employee Name <span class="r">*</span></label><input type="text" id="fName" placeholder="Full name"/></div>
        <div class="fg"><label>Employee No. <span class="r">*</span></label><input type="text" id="fEmpNo" placeholder="SH-2101"/></div>
        <div class="fg"><label>Project No. <span class="r">*</span></label><input type="text" id="fProject" placeholder="26XXX"/></div>
        <div class="fg wide"><label>Description <span class="r">*</span></label><textarea id="fDesc" rows="2" placeholder="Brief description of work done"></textarea></div>
        <div class="fg"><label>Hours Spent <span class="r">*</span></label><input type="number" id="fHours" placeholder="2.5" step="0.25" min="0"/></div>
        <div class="fg"><label>Task Allocated By <span class="r">*</span></label><input type="text" id="fAllocBy" placeholder="Manager name"/></div>
        <div class="fg"><label>Task Status <span class="r">*</span></label>
          <select id="fStatus"><option value="">-- Select --</option><option>Pending</option><option>In Progress</option><option>Completed</option></select>
        </div>
        <div class="fg"><label>Remarks</label><input type="text" id="fRemarks" placeholder="Optional"/></div>
        <div class="fg"><label>Verified By</label><input type="text" id="fVerifiedBy" placeholder="Optional"/></div>
      </div>
      <div class="form-btns">
        <button class="btn btn-gray btn-sm" onclick="cancelForm()">Cancel</button>
        <button class="btn btn-blue btn-sm" id="saveBtn" onclick="saveEntry()">Save Entry</button>
      </div>
    </div>
    <div class="fbar">
      <input type="text" id="search" placeholder="&#128269; Search name, project, description..." oninput="render()"/>
      <select id="fltStatus" onchange="render()"><option value="">All Statuses</option><option>Pending</option><option>In Progress</option><option>Completed</option></select>
      <select id="fltMonth" onchange="render()"><option value="">All Months</option></select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Date</th><th>Employee</th><th>Emp No.</th><th>Project</th><th>Description</th><th>Hrs</th><th>Allocated By</th><th>Status</th><th>Remarks</th><th>Verified By</th><th>Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty">No entries yet. Click <strong>+ Add Entry</strong> to get started.</div>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
firebase.initializeApp({
  apiKey:'AIzaSyCfmRxMz5pQptUrCWLE5EWVc2GTfbCmyZA',
  authDomain:'sh-timesheet.firebaseapp.com',
  databaseURL:'https://sh-timesheet-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'sh-timesheet',
  storageBucket:'sh-timesheet.firebasestorage.app',
  messagingSenderId:'400254422937',
  appId:'1:400254422937:web:625904091041a2e2a90d08'
});

var db = firebase.database();
var entries = [];
var editId = null;

// Connect to Realtime Database
db.ref('timesheet').on('value', function(snap){
  var data = snap.val();
  entries = data ? Object.keys(data).map(function(k){return Object.assign({id:k},data[k]);}) : [];
  entries.sort(function(a,b){return(a.createdAt||0)-(b.createdAt||0);});
  render();
  updateStats();
  document.getElementById('dot').className='dot';
  document.getElementById('syncTxt').textContent='Firebase live';
}, function(err){
  document.getElementById('dot').className='dot off';
  document.getElementById('syncTxt').textContent='Error: '+err.code;
  toast(err.message,'err');
});

function showForm(){
  editId=null;clearForm();
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('formArea').style.display='block';
  document.getElementById('saveBtn').textContent='Save Entry';
}
function cancelForm(){document.getElementById('formArea').style.display='none';editId=null;}
function clearForm(){['fDate','fName','fEmpNo','fProject','fDesc','fHours','fAllocBy','fStatus','fRemarks','fVerifiedBy'].forEach(function(id){document.getElementById(id).value='';});}

function saveEntry(){
  var required=['fDate','fName','fEmpNo','fProject','fDesc','fHours','fAllocBy','fStatus'];
  for(var i=0;i<required.length;i++){if(!document.getElementById(required[i]).value.trim()){toast('Please fill all required fields','err');return;}}
  var entry={
    date:document.getElementById('fDate').value,
    name:document.getElementById('fName').value.trim(),
    empNo:document.getElementById('fEmpNo').value.trim(),
    project:document.getElementById('fProject').value.trim(),
    desc:document.getElementById('fDesc').value.trim(),
    hours:parseFloat(document.getElementById('fHours').value)||0,
    allocBy:document.getElementById('fAllocBy').value.trim(),
    status:document.getElementById('fStatus').value,
    remarks:document.getElementById('fRemarks').value.trim(),
    verifiedBy:document.getElementById('fVerifiedBy').value.trim(),
    createdAt:editId?(entries.find(function(e){return e.id===editId;})||{}).createdAt||Date.now():Date.now(),
    updatedAt:Date.now()
  };
  try{
    if(editId){db.ref('timesheet/'+editId).set(entry);toast('Entry updated!','ok');}
    else{db.ref('timesheet').push(entry);toast('Entry saved!','ok');}
    cancelForm();
  }catch(e){toast('Save failed: '+e.message,'err');}
}

function editEntry(id){
  var e=entries.find(function(x){return x.id===id;});if(!e)return;
  editId=id;
  document.getElementById('fDate').value=e.date||'';
  document.getElementById('fName').value=e.name||'';
  document.getElementById('fEmpNo').value=e.empNo||'';
  document.getElementById('fProject').value=e.project||'';
  document.getElementById('fDesc').value=e.desc||'';
  document.getElementById('fHours').value=e.hours||'';
  document.getElementById('fAllocBy').value=e.allocBy||'';
  document.getElementById('fStatus').value=e.status||'';
  document.getElementById('fRemarks').value=e.remarks||'';
  document.getElementById('fVerifiedBy').value=e.verifiedBy||'';
  document.getElementById('formArea').style.display='block';
  document.getElementById('saveBtn').textContent='Update Entry';
}

function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  db.ref('timesheet/'+id).remove()
    .then(function(){toast('Entry deleted','ok');})
    .catch(function(e){toast('Delete failed: '+e.message,'err');});
}

function render(){
  var q=document.getElementById('search').value.toLowerCase();
  var st=document.getElementById('fltStatus').value;
  var mo=document.getElementById('fltMonth').value;
  var f=entries.filter(function(e){
    return(!q||[e.name,e.project,e.desc,e.empNo].some(function(v){return(v||'').toLowerCase().includes(q);}))
      &&(!st||e.status===st)&&(!mo||(e.date||'').startsWith(mo));
  });
  document.getElementById('empty').style.display=f.length?'none':'block';
  document.getElementById('tbody').innerHTML=f.map(function(e,i){
    var bc=e.status==='Completed'?'bc':e.status==='In Progress'?'bi':'bp';
    return'<tr>'
      +'<td style="color:#94A3B8;font-size:.72rem">'+(i+1)+'</td>'
      +'<td style="white-space:nowrap;font-size:.78rem">'+fmtDate(e.date)+'</td>'
      +'<td><strong>'+esc(e.name)+'</strong></td>'
      +'<td style="color:#2563EB;font-size:.78rem">'+esc(e.empNo)+'</td>'
      +'<td style="font-size:.78rem">'+esc(e.project)+'</td>'
      +'<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(e.desc)+'">'+esc(e.desc)+'</td>'
      +'<td style="text-align:right;font-weight:700">'+((+e.hours||0).toFixed(2))+'</td>'
      +'<td>'+esc(e.allocBy)+'</td>'
      +'<td><span class="badge '+bc+'">'+esc(e.status)+'</span></td>'
      +'<td style="color:#64748B;font-size:.78rem">'+(esc(e.remarks)||'—')+'</td>'
      +'<td style="color:#64748B;font-size:.78rem">'+(esc(e.verifiedBy)||'—')+'</td>'
      +'<td><div class="act">'
      +'<button class="btn btn-gray btn-sm" onclick="editEntry(\''+e.id+'\')">&#9998;</button>'
      +'<button class="btn btn-red btn-sm" onclick="deleteEntry(\''+e.id+'\')">&#128465;</button>'
      +'</div></td></tr>';
  }).join('');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';var p=d.split('-');var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return p[2]+'-'+(m[+p[1]-1]||'')+'-'+p[0];}

function updateStats(){
  var total=entries.reduce(function(s,e){return s+(+e.hours||0);},0);
  document.getElementById('sHours').textContent=total.toFixed(1);
  document.getElementById('sPending').textContent=entries.filter(function(e){return e.status==='Pending';}).length;
  document.getElementById('sProgress').textContent=entries.filter(function(e){return e.status==='In Progress';}).length;
  document.getElementById('sDone').textContent=entries.filter(function(e){return e.status==='Completed';}).length;
  var months=[...new Set(entries.map(function(e){return(e.date||'').slice(0,7);}).filter(Boolean))].sort().reverse();
  var sel=document.getElementById('fltMonth');var cur=sel.value;
  sel.innerHTML='<option value="">All Months</option>'+months.map(function(m){return'<option value="'+m+'">'+m+'</option>';}).join('');
  if(cur)sel.value=cur;
}

function exportExcel(){
  if(!entries.length){toast('No entries to export','err');return;}
  var wb=XLSX.utils.book_new();
  var data=[['Date','Employee Name','Employee No.','Project No.','Description','Hours','Allocated By','Status','Remarks','Verified By']]
    .concat(entries.map(function(e){return[e.date,e.name,e.empNo,e.project,e.desc,e.hours,e.allocBy,e.status,e.remarks,e.verifiedBy];}));
  var ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[12,22,14,16,36,8,20,14,24,16].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,ws,'Time Sheet');
  var now=new Date();
  XLSX.writeFile(wb,'SH_Timesheet_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+'.xlsx');
  toast('Exported!','ok');
}

function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){el.remove();},3000);
}
</script>
</body>
</html>
